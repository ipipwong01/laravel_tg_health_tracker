services:
    db:
        image: mysql:8.4
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-telegram_health_tracker}
            MYSQL_USER: ${DOCKER_DB_USERNAME:-laravel}
            MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
        ports:
            - "${FORWARD_DB_PORT:-3306}:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-p${MYSQL_ROOT_PASSWORD:-root}",
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    migrate:
        build:
            context: .
        env_file: .env
        environment:
            DB_HOST: db
            DB_PORT: 3306
            DB_USERNAME: ${DOCKER_DB_USERNAME:-laravel}
            DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
        depends_on:
            db:
                condition: service_healthy
        command: php artisan migrate --force
        restart: "no"

    app:
        build:
            context: .
        env_file: .env
        environment:
            DB_HOST: db
            DB_PORT: 3306
            DB_USERNAME: ${DOCKER_DB_USERNAME:-laravel}
            DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
        volumes:
            - .:/var/www/html
        depends_on:
            migrate:
                condition: service_completed_successfully

    nginx:
        image: nginx:1.31.3-alpine
        ports:
            - "${APP_PORT:-8080}:80"
        volumes:
            - .:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app

    telegram-worker:
        build:
            context: .
        env_file: .env
        environment:
            DB_HOST: db
            DB_PORT: 3306
            DB_USERNAME: ${DOCKER_DB_USERNAME:-laravel}
            DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
        command: php artisan telegram:poll
        restart: unless-stopped
        depends_on:
            migrate:
                condition: service_completed_successfully

volumes:
    mysql-data:
